<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>灵饰数据调试</title>
</head>
<body>
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h1 style="margin: 0;">灵饰数据调试</h1>
    <a href="../index.html" style="background: #3498db; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 14px;">返回首页</a>
</div>
<div style="background: #f0f8ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #3498db;">
    <h3 style="margin-top: 0;">调试说明</h3>
    <p>此页面显示从 <code>improved_rules.js</code> 加载的灵饰数据结构化数据。</p>
    <p>数据来源：<code>lingshi_data.js</code>（已整合到 <code>improved_rules.js</code> 中）</p>
    <p>查看完整估价功能：<a href="estimate.html" style="color: #3498db; font-weight: bold;">灵饰估价表</a></p>
</div>
<div id="output"></div>

<script src="../../assets/data/improved_rules.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const output = document.getElementById('output');

    console.log("IMPROVED_RULES对象:", IMPROVED_RULES);
    console.log("ling_shi属性:", IMPROVED_RULES.ling_shi);

    if (!IMPROVED_RULES.ling_shi) {
        output.innerHTML = "<p style='color:red'>错误：IMPROVED_RULES中没有ling_shi属性</p>";
        console.error("IMPROVED_RULES中没有ling_shi属性");
        console.log("IMPROVED_RULES的键:", Object.keys(IMPROVED_RULES));
        return;
    }

    const lingShiData = IMPROVED_RULES.ling_shi.data;
    output.innerHTML += `<p>灵饰数据长度: ${lingShiData ? lingShiData.length : 0}</p>`;

    if (lingShiData && lingShiData.length > 0) {
        // 显示前10行数据
        for (let i = 0; i < Math.min(10, lingShiData.length); i++) {
            const row = lingShiData[i];
            output.innerHTML += `<h3>第${i}行:</h3>`;
            output.innerHTML += `<pre>${JSON.stringify(row, null, 2)}</pre>`;
        }

        // 分析数据结构
        const sampleRow = lingShiData[0];
        output.innerHTML += `<h3>数据结构分析:</h3>`;
        output.innerHTML += `<p>行键: ${Object.keys(sampleRow).join(', ')}</p>`;

        // 统计信息
        const positions = new Set();
        const types = new Set();
        const categories = new Set();
        const levels = new Set();

        for (let i = 0; i < Math.min(100, lingShiData.length); i++) {
            const row = lingShiData[i];
            if (row.position) positions.add(row.position);
            if (row.type) types.add(row.type);
            if (row.category) categories.add(row.category);
            if (row.level) levels.add(row.level);
        }

        output.innerHTML += `<h3>数据统计:</h3>`;
        output.innerHTML += `<p>部位: ${Array.from(positions).join(', ')}</p>`;
        output.innerHTML += `<p>类型: ${Array.from(types).join(', ')}</p>`;
        output.innerHTML += `<p>类别: ${Array.from(categories).join(', ')}</p>`;
        output.innerHTML += `<p>等级: ${Array.from(levels).sort((a,b) => parseInt(a)-parseInt(b)).join(', ')}</p>`;
    } else {
        output.innerHTML += "<p style='color:red'>错误：灵饰数据为空</p>";
    }
});
</script>
</body>
</html>
