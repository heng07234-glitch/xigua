<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>图标测试</title>
<style>
body { font-family: Arial; padding: 20px; }
.icon-test { font-size: 24px; margin: 10px; padding: 10px; border: 1px solid #ddd; }
</style>
</head>
<body>
<h1>灵饰类型图标测试</h1>
<div id="icons"></div>
<script src="../assets/data/icon_mapping.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('icons');
    for (const [type, icon] of Object.entries(ICON_MAPPING)) {
        const div = document.createElement('div');
        div.className = 'icon-test';
        div.innerHTML = `<strong>${type}:</strong> ${icon} 示例: ${icon} ${type}灵饰`;
        container.appendChild(div);
    }
});
</script>
</body>
</html>
