<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>灵饰数据加载测试</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
.success { color: green; font-weight: bold; }
.error { color: red; font-weight: bold; }
pre { background: #f5f5f5; padding: 10px; overflow: auto; }
</style>
</head>
<body>
<h1>灵饰数据加载测试</h1>
<div id="status">测试中...</div>
<div id="results"></div>

<script src="../assets/data/icon_mapping.js"></script>
<script src="../assets/data/lingshi_data.js"></script>
<script src="../assets/data/improved_rules.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const status = document.getElementById('status');
    const results = document.getElementById('results');

    let testResults = [];

    // 测试1: LINGSHI_DATA
    if (typeof LINGSHI_DATA !== 'undefined') {
        testResults.push({
            name: 'LINGSHI_DATA',
            status: '✓ 已定义',
            details: `类型: ${typeof LINGSHI_DATA}, 长度: ${Array.isArray(LINGSHI_DATA) ? LINGSHI_DATA.length : '不是数组'}`
        });
    } else {
        testResults.push({
            name: 'LINGSHI_DATA',
            status: '✗ 未定义',
            details: 'lingshi_data.js可能没有正确加载'
        });
    }

    // 测试2: IMPROVED_RULES
    if (typeof IMPROVED_RULES !== 'undefined') {
        testResults.push({
            name: 'IMPROVED_RULES',
            status: '✓ 已定义',
            details: `类型: ${typeof IMPROVED_RULES}`
        });

        // 测试3: IMPROVED_RULES.ling_shi
        if (IMPROVED_RULES.ling_shi) {
            testResults.push({
                name: 'IMPROVED_RULES.ling_shi',
                status: '✓ 已定义',
                details: `data属性: ${IMPROVED_RULES.ling_shi.data ? '存在, 长度=' + (Array.isArray(IMPROVED_RULES.ling_shi.data) ? IMPROVED_RULES.ling_shi.data.length : '不是数组') : '不存在'}`
            });
        } else {
            testResults.push({
                name: 'IMPROVED_RULES.ling_shi',
                status: '✗ 未定义',
                details: 'improved_rules.js中没有ling_shi属性'
            });
        }
    } else {
        testResults.push({
            name: 'IMPROVED_RULES',
            status: '✗ 未定义',
            details: 'improved_rules.js可能没有正确加载'
        });
    }

    // 显示结果
    let html = '<h2>测试结果</h2><table border="1" cellpadding="10">';
    html += '<tr><th>项目</th><th>状态</th><th>详情</th></tr>';
    testResults.forEach(result => {
        html += `<tr>
            <td><strong>${result.name}</strong></td>
            <td class="${result.status.includes('✓') ? 'success' : 'error'}">${result.status}</td>
            <td>${result.details}</td>
        </tr>`;
    });
    html += '</table>';

    // 显示样本数据
    if (typeof LINGSHI_DATA !== 'undefined' && Array.isArray(LINGSHI_DATA) && LINGSHI_DATA.length > 0) {
        html += '<h3>LINGSHI_DATA样本（前3条）</h3><pre>' + JSON.stringify(LINGSHI_DATA.slice(0, 3), null, 2) + '</pre>';
    } else if (typeof IMPROVED_RULES !== 'undefined' && IMPROVED_RULES.ling_shi && Array.isArray(IMPROVED_RULES.ling_shi.data) && IMPROVED_RULES.ling_shi.data.length > 0) {
        html += '<h3>IMPROVED_RULES.ling_shi.data样本（前3条）</h3><pre>' + JSON.stringify(IMPROVED_RULES.ling_shi.data.slice(0, 3), null, 2) + '</pre>';
    }

    results.innerHTML = html;
    status.innerHTML = '<span class="success">测试完成！</span>';

    // 检查控制台是否有错误
    console.log('=== 灵饰数据加载测试结果 ===');
    testResults.forEach(result => {
        console.log(`${result.name}: ${result.status} - ${result.details}`);
    });
});
</script>
</body>
</html>
