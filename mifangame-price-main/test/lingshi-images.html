<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>灵饰图片测试</title>
<style>
body { font-family: Arial; padding: 20px; }
.image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
.image-item { border: 1px solid #ddd; padding: 10px; text-align: center; border-radius: 8px; }
.image-item img { max-width: 100%; height: auto; display: block; margin: 0 auto 10px; }
.level-section { margin-bottom: 30px; }
.level-title { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 15px; border-bottom: 2px solid #4CAF50; padding-bottom: 5px; }
</style>
</head>
<body>
<h1>灵饰图片测试</h1>
<p>测试从 <code>lingshi_estimate.html</code> 到 <code>assets/lingshi-logos/</code> 目录的相对路径。</p>

<div id="testResults"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const levels = ['60', '80', '100', '120', '140'];
    const types = ['戒指', '耳饰', '配饰', '手镯'];
    const container = document.getElementById('testResults');

    levels.forEach(level => {
        const levelSection = document.createElement('div');
        levelSection.className = 'level-section';

        const title = document.createElement('div');
        title.className = 'level-title';
        title.textContent = `${level}级灵饰图片`;
        levelSection.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'image-grid';

        types.forEach(type => {
            const imageItem = document.createElement('div');
            imageItem.className = 'image-item';

            const img = document.createElement('img');
            img.src = `../assets/images/lingshi-logos/${level}${type}.png`;
            img.alt = `${level}${type}`;
            img.onload = function() {
                console.log(`图片加载成功: ${img.src}`);
            };
            img.onerror = function() {
                console.error(`图片加载失败: ${img.src}`);
                imageItem.innerHTML += `<div style="color:red;">加载失败: ${level}${type}.png</div>`;
            };

            const label = document.createElement('div');
            label.textContent = `${type}`;

            imageItem.appendChild(img);
            imageItem.appendChild(label);
            grid.appendChild(imageItem);
        });

        levelSection.appendChild(grid);
        container.appendChild(levelSection);
    });
});
</script>

</body>
</html>
